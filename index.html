<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tự luận Sinh 11</title>

<style>
body{font-family:Arial;max-width:900px;margin:auto;}
textarea{width:100%;height:90px;margin-top:5px;}
.box{border:1px solid gray;padding:12px;margin:12px;border-radius:10px;}
button{padding:10px;margin-top:10px;}
</style>

</head>

<body>

<h2>Tự luận giữa kỳ II – Sinh học 11 (2025–2026)</h2>

Tên học sinh:
<input id="name">

<div id="questions"></div>

<button onclick="grade()">Chấm điểm</button>

<h2 id="score"></h2>

<h3>Bảng xếp hạng</h3>

<div id="history"></div>

<script>

let questions=[

{q:"Câu 1: Trình bày ứng dụng của hướng động trong sản xuất nông nghiệp",keywords:["rễ","nước","khoáng","ánh sáng","thân leo","giàn"]},

{q:"Câu 2: Trình bày ứng dụng của ứng động trong sản xuất nông nghiệp",keywords:["ngủ","hạt","nhiệt độ","ánh sáng","ra hoa","côn trùng"]},

{q:"Câu 3: Mô tả cơ chế cảm ứng khi chạm vào vật nóng",keywords:["thụ thể","tủy sống","xung thần kinh","co tay","phản xạ"]},

{q:"Câu 4: Vì sao hạ Ca2+ máu gây rối loạn cảm giác",keywords:["ca2","synapse","chất trung gian","xung","neuron"]},

{q:"Câu 5: Điều gì xảy ra nếu thụ thể đau bị tổn thương",keywords:["không cảm nhận","đau","nguy hiểm","bảo vệ","tổn thương"]},

{q:"Câu 6: Trình bày cấu tạo và chức năng neuron",keywords:["thân","sợi nhánh","sợi trục","xung thần kinh","truyền"]},

{q:"Câu 7: Synapse là gì? Quá trình truyền tin",keywords:["tiếp xúc","chất trung gian","khe","màng trước","màng sau"]},

{q:"Câu 8: Tập tính là gì? Phân loại",keywords:["chuỗi","bẩm sinh","học được","di truyền","môi trường"]}

];

let html="";

for(let i=0;i<8;i++){
html+=`
<div class="box">
<b>${questions[i].q}</b>
<br>
<textarea id="a${i}" placeholder="Nhập câu trả lời..."></textarea>
</div>`;
}

document.getElementById("questions").innerHTML=html;

function grade(){

let totalScore=0;
let maxEach=10/8; //1.25 điểm mỗi câu

for(let i=0;i<8;i++){

let ans=document.getElementById("a"+i).value.toLowerCase();
let match=0;

for(let k of questions[i].keywords){
if(ans.includes(k)) match++;
}

let ratio=match/questions[i].keywords.length;

if(ratio>=0.8){
totalScore+=maxEach;
}else{
totalScore+=maxEach*ratio; // thiếu keyword bị trừ theo tỉ lệ
}

}

let finalScore=totalScore.toFixed(2);

document.getElementById("score").innerHTML="Điểm: "+finalScore+" / 10";

let history=JSON.parse(localStorage.getItem("scores")||"[]");

history.push({
name:document.getElementById("name").value,
score:Number(finalScore),
time:new Date().toLocaleString()
});

localStorage.setItem("scores",JSON.stringify(history));

showHistory();

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("scores")||"[]");

history.sort((a,b)=>b.score-a.score);

let h="";

for(let i of history){
h+=i.name+" : "+i.score+" điểm ("+i.time+")<br>";
}

document.getElementById("history").innerHTML=h;

}

showHistory();

</script>

</body>

</html>
